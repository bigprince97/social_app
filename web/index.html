<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="AlphaOmega — 经书阅读与学习社区。阅读经典文本，添加书签、高亮和笔记，与同道交流。">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AlphaOmega">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AlphaOmega · 经书阅读与学习社区</title>
  <link rel="manifest" href="manifest.json">
  <!-- Chinese font support -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #5B3FB0; }
    #omega-splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #7E5CD6 0%, #4E2EA0 100%);
      transition: opacity .45s ease;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    #omega-splash .mark {
      color: #fff; font-size: 66px; letter-spacing: 6px;
      font-family: "Baskerville", "Times New Roman", Georgia, serif;
    }
    #omega-splash .name { color: #fff; font-size: 20px; margin-top: 10px; opacity: .95; }
    #omega-splash .sub  { color: #fff; font-size: 13px; margin-top: 6px; opacity: .7; }
    #omega-splash .spin {
      margin-top: 28px; width: 30px; height: 30px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.3); border-top-color: #fff;
      animation: omega-rot 0.9s linear infinite;
    }
    @keyframes omega-rot { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="omega-splash">
    <div class="mark">ΑΩ</div>
    <div class="name">AlphaOmega</div>
    <div class="sub">经书阅读与学习社区</div>
    <div class="spin"></div>
  </div>

  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    _flutter.loader.load({
      onEntrypointLoaded: async function (engineInitializer) {
        const appRunner = await engineInitializer.initializeEngine();
        await appRunner.runApp();
        const splash = document.getElementById('omega-splash');
        if (splash) { splash.style.opacity = '0'; setTimeout(function () { splash.remove(); }, 450); }
      }
    });
  </script>
</body>
</html>
